# ============================================================
# GTA-Apple Docker Compose
# - Anisette v3: 官方维护镜像 (dadoum/anisette-v3-server)
# - AltServer:   自建镜像，推送到 Docker Hub
# ============================================================

services:
  # ============================================
  # Anisette v3 Server - 官方维护，直接引用
  # https://github.com/Dadoum/anisette-v3-server
  # ============================================
  anisette:
    image: dadoum/anisette-v3-server:latest
    container_name: anisette-v3
    restart: unless-stopped
    pull_policy: always
    init: true
    ports:
      - "${ANISETTE_PORT:-6969}:6969"
    volumes:
      - anisette_data:/home/Alcoholic/.config/anisette-v3/lib/
    networks:
      - altserver-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6969"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # AltServer-Linux - 自建镜像
  # 本地构建 或 从 Docker Hub 拉取
  # ============================================
  altserver:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DEBIAN_RELEASE: ${DEBIAN_RELEASE:-trixie}
    image: ${ALTSERVER_IMAGE:-gta/gta-altserver:latest}
    container_name: altserver
    restart: unless-stopped
    init: true
    depends_on:
      anisette:
        condition: service_healthy
        restart: true
    environment:
      - ALTSERVER_ANISETTE_SERVER=http://anisette:6969
      - USBMUXD_SOCKET_ADDRESS=${USBMUXD_SOCKET_ADDRESS:-host.docker.internal:27015}
    volumes:
      - altserver_data:/opt/altserver/data
      - ./ipa:/opt/altserver/ipa:ro
    networks:
      - altserver-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x AltServer >/dev/null && curl -fsS --max-time 5 \"$ALTSERVER_ANISETTE_SERVER\" >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  anisette_data:
    name: anisette-v3_data
  altserver_data:
    name: altserver_data

networks:
  altserver-net:
    name: altserver-network
    driver: bridge
